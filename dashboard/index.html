<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LeadBot Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;
      --border:#2a2a3a;--accent:#4f6ef7;--accent-glow:rgba(79,110,247,0.25);
      --green:#22c55e;--text:#e8e8f0;--muted:#6b6b80;
      --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
    #login{min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:radial-gradient(ellipse at 50% 0%,rgba(79,110,247,0.1) 0%,transparent 60%);padding:16px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
      padding:40px;width:100%;max-width:420px;box-shadow:0 0 60px rgba(0,0,0,0.5);}
    .login-logo{width:48px;height:48px;background:var(--accent);border-radius:12px;
      display:flex;align-items:center;justify-content:center;margin-bottom:24px;
      box-shadow:0 0 24px var(--accent-glow);}
    .login-logo svg{width:24px;height:24px;fill:white;}
    .card h1{font-size:24px;font-weight:700;margin-bottom:4px;}
    .card>p{color:var(--muted);font-size:14px;margin-bottom:32px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px;}
    .field input{width:100%;padding:12px 16px;background:var(--surface2);
      border:1px solid var(--border);border-radius:10px;color:var(--text);
      font-family:var(--font);font-size:14px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
    .btn{width:100%;padding:13px;background:var(--accent);color:white;border:none;
      border-radius:10px;font-family:var(--font);font-size:15px;font-weight:600;
      cursor:pointer;margin-top:8px;transition:opacity 0.2s,transform 0.1s;}
    .btn:hover{opacity:0.9;}.btn:active{transform:scale(0.98);}
    .err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
      color:#f87171;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:16px;display:none;}
    #dashboard{display:none;}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);
      padding:0 20px;height:56px;display:flex;align-items:center;
      justify-content:space-between;position:sticky;top:0;z-index:10;}
    .tl{display:flex;align-items:center;gap:10px;min-width:0;}
    .lm{width:30px;height:30px;background:var(--accent);border-radius:8px;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .lm svg{width:15px;height:15px;fill:white;}
    .topbar h2{font-size:15px;font-weight:600;white-space:nowrap;}
    .badge{background:var(--surface2);border:1px solid var(--border);
      padding:3px 10px;border-radius:20px;font-size:12px;color:var(--muted);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}
    .top-actions{display:flex;gap:8px;flex-shrink:0;}
    .ghost-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
      padding:5px 12px;border-radius:8px;font-family:var(--font);font-size:13px;
      cursor:pointer;transition:all 0.2s;white-space:nowrap;}
    .ghost-btn:hover{border-color:var(--text);color:var(--text);}
    .main{padding:20px;max-width:1100px;margin:0 auto;}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;}
    .stat-label{font-size:12px;color:var(--muted);margin-bottom:6px;}
    .stat-val{font-size:28px;font-weight:700;font-family:var(--mono);}
    .c-accent{color:var(--accent);}.c-green{color:var(--green);}
    .section{background:var(--surface);border:1px solid var(--border);
      border-radius:14px;padding:20px;margin-bottom:20px;}
    .sec-title{font-size:15px;font-weight:600;margin-bottom:6px;}
    .sec-sub{font-size:13px;color:var(--muted);margin-bottom:14px;}
    .code{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
      padding:14px;font-family:var(--mono);font-size:12px;color:#a5b4fc;
      word-break:break-all;position:relative;padding-right:64px;}
    .copy-btn{position:absolute;top:10px;right:10px;background:var(--surface);
      border:1px solid var(--border);color:var(--muted);padding:4px 10px;
      border-radius:6px;font-family:var(--font);font-size:12px;cursor:pointer;
      transition:color 0.2s;white-space:nowrap;}
    .copy-btn:hover{color:var(--text);}
    .copy-btn.copied{color:var(--green);border-color:var(--green);}
    .leads-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
    .leads-head{padding:18px 20px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;}
    .live{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--green);}
    .live::before{content:'';width:8px;height:8px;background:var(--green);
      border-radius:50%;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;min-width:480px;}
    th{text-align:left;padding:10px 16px;font-size:12px;font-weight:500;
      color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;
      background:var(--surface2);border-bottom:1px solid var(--border);}
    td{padding:14px 16px;font-size:14px;border-bottom:1px solid var(--border);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:var(--surface2);}
    .wa{display:inline-flex;align-items:center;gap:5px;
      background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);
      color:var(--green);padding:4px 10px;border-radius:6px;
      text-decoration:none;font-size:13px;font-weight:500;white-space:nowrap;}
    .wa:hover{background:rgba(34,197,94,0.2);}
    .empty{text-align:center;padding:48px 20px;color:var(--muted);}
    .empty p{margin-top:8px;font-size:14px;}
    .loading{text-align:center;padding:40px;color:var(--muted);}
    @media(max-width:600px){
      .stats{grid-template-columns:1fr 1fr;}
      .main{padding:14px;}
      .card{padding:28px 20px;}
      .badge{display:none;}
    }
    @media(max-width:380px){
      .stats{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="login-logo"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
    <h1>LeadBot</h1>
    <p>Sign in to view your captured leads</p>
    <div class="field"><label>Widget Key</label><input id="wk" type="text" placeholder="your-widget-key"/></div>
    <div class="field"><label>Dashboard Secret</label><input id="sec" type="password" placeholder="••••••••"/></div>
    <button class="btn" onclick="login()">View My Leads →</button>
    <div class="err" id="err">Invalid credentials. Check your widget key and secret.</div>
  </div>
</div>

<div id="dashboard">
  <div class="topbar">
    <div class="tl">
      <div class="lm"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
      <h2>LeadBot</h2>
      <span class="badge" id="biz-name">Loading...</span>
    </div>
    <div class="top-actions">
      <button class="ghost-btn" onclick="loadLeads()">↻</button>
      <button class="ghost-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="stats">
      <div class="stat"><div class="stat-label">Total Leads</div><div class="stat-val c-accent" id="s-total">—</div></div>
      <div class="stat"><div class="stat-label">This Week</div><div class="stat-val c-green" id="s-week">—</div></div>
      <div class="stat"><div class="stat-label">Today</div><div class="stat-val" id="s-today">—</div></div>
    </div>

    <div class="section">
      <div class="sec-title">📋 Your Embed Code</div>
      <div class="sec-sub">Paste this one line inside &lt;body&gt; on any website.</div>
      <div class="code"><span id="embed-txt">Loading...</span><button class="copy-btn" id="cpbtn" onclick="copyEmbed()">Copy</button></div>
    </div>

    <div class="leads-box">
      <div class="leads-head">
        <div class="sec-title">Captured Leads</div>
        <div class="live">Live</div>
      </div>
      <div class="table-wrap"><div id="leads-body"><div class="loading">Loading leads...</div></div></div>
    </div>
  </div>
</div>

<script>
  const BACKEND='https://leadbot-backend.harjeetgowda644.workers.dev';
  let curKey='',curSec='';

  async function login(){
    const wk=document.getElementById('wk').value.trim();
    const sec=document.getElementById('sec').value.trim();
    const errEl=document.getElementById('err');
    errEl.style.display='none';
    if(!wk||!sec){errEl.style.display='block';errEl.textContent='Fill in both fields.';return;}
    try{
      const r=await fetch(`${BACKEND}/api/leads?widgetKey=${wk}&secret=${sec}`);
      const d=await r.json();
      if(!r.ok){errEl.style.display='block';return;}
      curKey=wk;curSec=sec;
      localStorage.setItem('lb_k',wk);localStorage.setItem('lb_s',sec);
      showDash(d);
    }catch(e){errEl.style.display='block';errEl.textContent='Connection error. Is the backend deployed?';}
  }

  function showDash(data){
    document.getElementById('login').style.display='none';
    document.getElementById('dashboard').style.display='block';
    document.getElementById('biz-name').textContent=data.business||'Your Business';
    document.getElementById('embed-txt').textContent=`<script src="${BACKEND}/api/widget.js?key=${curKey}"><\/script>`;
    renderLeads(data.leads||[]);
  }

  function renderLeads(leads){
    const now=new Date();
    const weekAgo=new Date(now-7*24*60*60*1000);
    const todayStr=now.toISOString().split('T')[0];
    document.getElementById('s-total').textContent=leads.length;
    document.getElementById('s-week').textContent=leads.filter(l=>new Date(l.created_at)>=weekAgo).length;
    document.getElementById('s-today').textContent=leads.filter(l=>l.created_at.startsWith(todayStr)).length;
    const body=document.getElementById('leads-body');
    if(!leads.length){body.innerHTML=`<div class="empty"><div style="font-size:36px">🎯</div><p>No leads yet. Embed the widget on a website to start.</p></div>`;return;}
    const rows=leads.map(l=>{
      const wa=l.whatsapp?l.whatsapp.replace(/\D/g,''):'';
      const date=new Date(l.created_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      return `<tr>
        <td><strong>${l.visitor_name||'—'}</strong></td>
        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;">${l.need||'—'}</td>
        <td>${wa?`<a class="wa" href="https://wa.me/91${wa}" target="_blank">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          ${l.whatsapp}</a>`:'—'}</td>
        <td style="color:var(--muted);font-size:12px;white-space:nowrap;">${date}</td>
      </tr>`;
    }).join('');
    body.innerHTML=`<table><thead><tr><th>Name</th><th>Looking For</th><th>WhatsApp</th><th>Time</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  async function loadLeads(){
    if(!curKey)return;
    const r=await fetch(`${BACKEND}/api/leads?widgetKey=${curKey}&secret=${curSec}`);
    const d=await r.json();
    if(d.leads){document.getElementById('biz-name').textContent=d.business;renderLeads(d.leads);}
  }

  function copyEmbed(){
    navigator.clipboard.writeText(document.getElementById('embed-txt').textContent);
    const btn=document.getElementById('cpbtn');
    btn.textContent='Copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);
  }

  function logout(){
    localStorage.removeItem('lb_k');localStorage.removeItem('lb_s');
    curKey='';curSec='';
    document.getElementById('dashboard').style.display='none';
    document.getElementById('login').style.display='flex';
  }

  window.addEventListener('load',()=>{
    const k=localStorage.getItem('lb_k'),s=localStorage.getItem('lb_s');
    if(k&&s){document.getElementById('wk').value=k;document.getElementById('sec').value=s;login();}
  });
  setInterval(loadLeads,60000);
</script>
</body>
</html>
